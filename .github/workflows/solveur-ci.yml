name: solveur-ci

on:
  pull_request:
    paths:
      - "solveur/**"
      - ".github/workflows/solveur-ci.yml"
  push:
    branches: [main]
    paths:
      - "solveur/**"
      - ".github/workflows/solveur-ci.yml"

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: solveur
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"
      - name: Cache ARC datasets
        uses: actions/cache@v4
        with:
          path: solveur/data/raw
          key: arc-datasets-${{ hashFiles('solveur/solveur/data/manifest.json') }}
      - name: Install
        run: uv sync
      - name: Lint
        run: |
          uv run ruff check .
          uv run mypy solveur
      - name: Test
        run: uv run pytest tests/ -q
      # Hook X-56 : rapport du dernier run à chaque merge sur main
      - name: Rapport du dernier run
        if: github.event_name == 'push'
        run: |
          if [ -f runs.db ]; then uv run python -m solveur.report --latest; \
          else echo "pas de runs.db — rien à faire"; fi
